<!DOCTYPE html>
<html lang="ja"> <head>
    <meta charset="UTF-8"> <title>マイ道具箱 - スケジュール帳</title>
    <style>
        body { font-family: sans-serif; padding: 20px; line-height: 1.6; }
        .input-group { margin-bottom: 20px; display: flex; gap: 10px; flex-wrap: wrap; }
        input, button { padding: 8px; }
        li { cursor: pointer; padding: 10px; border-bottom: 1px solid #eee; list-style: none; }
        li:hover { background: #f9f9f9; color: red; }
        li::before { content: "📅 "; }
        .date-label { font-weight: bold; margin-right: 10px; color: #555; }
    </style>
</head>
<body>

    <h1>自分専用スケジュール帳</h1>

    <div class="input-group">
        <input type="date" id="todo-date">
        <input type="text" id="todo-input" placeholder="予定を入力">
        <button onclick="addTodo()">追加</button>
    </div>

    <ul id="todo-list"></ul>

    <script>
        // ページを開いた時に、今日の日付を初期値にする
        const dateInput = document.getElementById('todo-date');
        dateInput.value = new Date().toISOString().split('T')[0];

        function addTodo() {
            const input = document.getElementById('todo-input');
            const dateVal = document.getElementById('todo-date').value;
            const list = document.getElementById('todo-list');

            if (input.value !== "" && dateVal !== "") {
                const li = document.createElement('li');
                
                // 日付と内容を表示するように変更
                li.innerHTML = `<span class="date-label">${dateVal}</span> ${input.value}`;

                // クリックで削除する機能はそのまま
                li.onclick = function() {
                    if(confirm("この予定を完了（削除）しますか？")) {
                        this.remove();
                    }
                };

                list.appendChild(li);
                input.value = "";
            } else {
                alert("日付と予定の両方を入力してくださいね！");
            }
        }
    </script>

</body>
</html>
