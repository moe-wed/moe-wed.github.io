<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>保存できる！万能カレンダー</title>
    <style>
        :root { --primary: #ffcc00; --bg: #f0f2f5; --text: #2c3e50; }
        body { font-family: sans-serif; padding: 20px; background: var(--bg); color: var(--text); display: flex; flex-direction: column; align-items: center; }
        .input-group { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; display: flex; gap: 10px; width: 100%; max-width: 600px; }
        input { padding: 8px; border: 1px solid #ddd; border-radius: 6px; }
        button { background: var(--primary); border: none; border-radius: 6px; padding: 8px 15px; cursor: pointer; font-weight: bold; }
        .calendar-container { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 800px; }
        .calendar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .nav-btn { background: #eee; border: none; padding: 5px 15px; border-radius: 5px; cursor: pointer; font-size: 18px; }
        #month-display { font-size: 24px; font-weight: bold; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; }
        .day-name { text-align: center; font-weight: bold; padding: 10px; background: #f8f9fa; border-radius: 4px; font-size: 14px; }
        .day { min-height: 90px; border: 1px solid #eee; padding: 5px; background: #fff; border-radius: 4px; overflow-y: auto; }
        .day.today { border: 2px solid var(--primary); background: #fffdf0; }
        .date-num { font-size: 12px; color: #888; margin-bottom: 5px; }
        .event { font-size: 11px; background: var(--primary); padding: 2px 5px; border-radius: 3px; margin-bottom: 2px; cursor: pointer; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    </style>
</head>
<body>

    <h1>保存機能付きカレンダー</h1>

    <div class="input-group">
        <input type="date" id="todo-date">
        <input type="text" id="todo-input" placeholder="予定を入力" style="flex-grow: 1;">
        <button onclick="addEvent()">追加</button>
    </div>

    <div class="calendar-container">
        <div class="calendar-header">
            <button class="nav-btn" onclick="changeMonth(-1)">❮</button>
            <div id="month-display"></div>
            <button class="nav-btn" onclick="changeMonth(1)">❯</button>
        </div>
        <div class="calendar-grid" id="calendar-grid"></div>
    </div>

    <script>
        let currentDisplayDate = new Date();
        // ★ 読み込み時に保存されたデータを取得（なければ空っぽ）
        let allEvents = JSON.parse(localStorage.getItem('myCalendarEvents')) || {};

        function init() {
            document.getElementById('todo-date').value = new Date().toISOString().split('T')[0];
            render();
        }

        function render() {
            const grid = document.getElementById('calendar-grid');
            const display = document.getElementById('month-display');
            grid.innerHTML = '';

            const year = currentDisplayDate.getFullYear();
            const month = currentDisplayDate.getMonth();
            display.innerText = `${year}年 ${month + 1}月`;

            ['日','月','火','水','木','金','土'].forEach(d => {
                const div = document.createElement('div');
                div.className = 'day-name';
                div.innerText = d;
                grid.appendChild(div);
            });

            const firstDay = new Date(year, month, 1).getDay();
            const lastDate = new Date(year, month + 1, 0).getDate();

            for (let i = 0; i < firstDay; i++) grid.appendChild(document.createElement('div'));

            for (let d = 1; d <= lastDate; d++) {
                const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                const dayDiv = document.createElement('div');
                dayDiv.className = 'day';
                if (dateStr === new Date().toISOString().split('T')[0]) dayDiv.classList.add('today');
                dayDiv.innerHTML = `<div class="date-num">${d}</div>`;
                
                if (allEvents[dateStr]) {
                    allEvents[dateStr].forEach((text, idx) => {
                        const ev = document.createElement('div');
                        ev.className = 'event';
                        ev.innerText = text;
                        ev.onclick = () => { 
                            if(confirm("消去しますか？")){ 
                                allEvents[dateStr].splice(idx,1); 
                                saveAndRender(); // 保存して再描画
                            } 
                        };
                        dayDiv.appendChild(ev);
                    });
                }
                grid.appendChild(dayDiv);
            }
        }

        function changeMonth(diff) {
            currentDisplayDate.setMonth(currentDisplayDate.getMonth() + diff);
            render();
        }

        function addEvent() {
            const date = document.getElementById('todo-date').value;
            const text = document.getElementById('todo-input').value;
            if (!date || !text) return;
            if (!allEvents[date]) allEvents[date] = [];
            allEvents[date].push(text);
            document.getElementById('todo-input').value = '';
            saveAndRender(); // 保存して再描画
        }

        // ★ データをブラウザに保存する関数
        function saveAndRender() {
            localStorage.setItem('myCalendarEvents', JSON.stringify(allEvents));
            render();
        }

        init();
    </script>
</body>
</html>
