<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>マイ道具箱 - マンスリーカレンダー</title>
    <style>
        :root {
            --primary-color: #ffcc00;
            --bg-color: #f0f2f5;
            --text-color: #2c3e50;
        }

        body { 
            font-family: 'Helvetica Neue', Arial, sans-serif; 
            padding: 20px; 
            background-color: var(--bg-color); 
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 { margin-bottom: 20px; }

        /* 入力エリア */
        .input-group { 
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
            width: 100%;
            max-width: 600px;
        }

        input { padding: 10px; border: 1px solid #ddd; border-radius: 8px; }
        button { 
            background-color: var(--primary-color); 
            border: none; border-radius: 8px; 
            padding: 10px 20px; cursor: pointer; font-weight: bold; 
        }

        /* カレンダーの構造 */
        .calendar-container {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 800px;
        }

        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            font-size: 20px;
            font-weight: bold;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 5px;
        }

        .day-name {
            text-align: center;
            font-weight: bold;
            padding: 10px;
            background: #eee;
            border-radius: 4px;
        }

        .day {
            min-height: 80px;
            border: 1px solid #eee;
            padding: 5px;
            background: #fff;
            border-radius: 4px;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .day.today { border: 2px solid var(--primary-color); background: #fffdf0; }

        .date-num { font-size: 12px; color: #999; margin-bottom: 5px; }

        /* 予定のラベル */
        .event {
            font-size: 11px;
            background: var(--primary-color);
            padding: 2px 5px;
            border-radius: 3px;
            cursor: pointer;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
    </style>
</head>
<body>

    <h1>マンスリースケジュール</h1>

    <div class="input-group">
        <input type="date" id="todo-date">
        <input type="text" id="todo-input" placeholder="予定を入力" style="flex-grow: 1;">
        <button onclick="addEvent()">追加</button>
    </div>

    <div class="calendar-container">
        <div class="calendar-header" id="month-display"></div>
        <div class="calendar-grid" id="calendar-grid">
            </div>
    </div>

    <script>
        const events = {}; // 予定を保存するオブジェクト

        function initCalendar() {
            const now = new Date();
            const year = now.getFullYear();
            const month = now.getMonth();
            
            document.getElementById('month-display').innerText = `${year}年 ${month + 1}月`;
            document.getElementById('todo-date').value = now.toISOString().split('T')[0];

            renderCalendar(year, month);
        }

        function renderCalendar(year, month) {
            const grid = document.getElementById('calendar-grid');
            grid.innerHTML = '';

            const dayNames = ['日', '月', '火', '水', '木', '金', '土'];
            dayNames.forEach(name => {
                const div = document.createElement('div');
                div.className = 'day-name';
                div.innerText = name;
                grid.appendChild(div);
            });

            const firstDay = new Date(year, month, 1).getDay();
            const lastDate = new Date(year, month + 1, 0).getDate();

            // 空白のマス
            for (let i = 0; i < firstDay; i++) {
                grid.appendChild(document.createElement('div'));
            }

            // 日付のマス
            for (let date = 1; date <= lastDate; date++) {
                const dayDiv = document.createElement('div');
                dayDiv.className = 'day';
                const dateString = `${year}-${String(month + 1).padStart(2, '0')}-${String(date).padStart(2, '0')}`;
                
                dayDiv.innerHTML = `<div class="date-num">${date}</div>`;
                dayDiv.id = `date-${dateString}`;

                if (dateString === new Date().toISOString().split('T')[0]) {
                    dayDiv.classList.add('today');
                }

                grid.appendChild(dayDiv);
            }
        }

        function addEvent() {
            const date = document.getElementById('todo-date').value;
            const text = document.getElementById('todo-input').value;
            if (!date || !text) return;

            const dayDiv = document.getElementById(`date-${date}`);
            if (dayDiv) {
                const eventDiv = document.createElement('div');
                eventDiv.className = 'event';
                eventDiv.innerText = text;
                eventDiv.onclick = (e) => {
                    e.stopPropagation();
                    if(confirm("削除しますか？")) eventDiv.remove();
                };
                dayDiv.appendChild(eventDiv);
                document.getElementById('todo-input').value = '';
            } else {
                alert("今月のカレンダーの範囲外です！");
            }
        }

        initCalendar();
    </script>
</body>
</html>
